name: Presubmit Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'modules/**'
      - '.github/scripts/**'
      - '.github/workflows/presubmit.yml'
  workflow_dispatch:  # 允许手动触发

# 定义标签常量
env:
  TRIGGER_LABEL: 'run-presubmit'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 检查标签的任务
  check-label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      has_trigger_label: ${{ steps.check.outputs.has_trigger_label }}
    steps:
      - name: Check for trigger label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const triggerLabel = process.env.TRIGGER_LABEL;
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasLabel = labels.includes(triggerLabel);
            core.setOutput('has_trigger_label', hasLabel.toString());
            console.log(`Labels: ${labels.join(', ')}`);
            console.log(`Has '${triggerLabel}' label: ${hasLabel}`);

      - name: Comment if no trigger label
        if: steps.check.outputs.has_trigger_label == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const triggerLabel = process.env.TRIGGER_LABEL;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const marker = '<!-- presubmit-label-check -->';
            const existingComment = comments.find(c => c.body && c.body.includes(marker));

            const body = `${marker}
            ## ⏳ Presubmit Checks Waiting

            This PR modifies BCR modules but presubmit checks have **not** been triggered yet.

            To run the presubmit checks, add the \`${triggerLabel}\` label to this PR.

            **How to add the label:**
            1. Click the "Labels" section on the right sidebar
            2. Select \`${triggerLabel}\`

            The checks will run automatically once the label is added.
            `;

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Remove waiting comment if label exists
        if: steps.check.outputs.has_trigger_label == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- presubmit-label-check -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existingComment = comments.find(c => c.body && c.body.includes(marker));
            if (existingComment) {
              await github.rest.issues.deleteComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              console.log('Removed waiting comment');
            }

  # 主验证任务 - 只有带有标签时才运行
  validate:
    runs-on: ubuntu-latest
    needs: check-label
    if: ${{ needs.check-label.outputs.has_trigger_label == 'true' }}
    permissions:
      contents: read
      pull-requests: write
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests jsonschema

      - name: Detect changed modules
        id: detect
        run: |
          python .github/scripts/detect_changes.py

      - name: Get PR labels
        id: labels
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' | tr '\n' ' ')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all validations
        id: validate
        run: |
          python .github/scripts/presubmit.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --pr-labels "${{ steps.labels.outputs.labels }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '.github/presubmit-results.md';
            if (fs.existsSync(path)) {
              const body = fs.readFileSync(path, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # Bazel build test - 只有带有标签时才运行
  bazel-test:
    runs-on: ubuntu-latest
    needs: [check-label, validate]
    if: ${{ needs.check-label.outputs.has_trigger_label == 'true' && needs.validate.outputs.has_changes == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-version: '1.20.0'

      - name: Detect changed modules
        id: detect
        run: |
          python .github/scripts/detect_changes.py --output changes.json
          echo "modules=$(cat changes.json | jq -r '.new_versions | keys | @json')" >> $GITHUB_OUTPUT

      - name: Run Bazel build tests
        run: |
          MODULES='${{ steps.detect.outputs.modules }}'
          if [ "$MODULES" = "[]" ] || [ -z "$MODULES" ]; then
            echo "No new modules to test"
            exit 0
          fi

          # Test each changed module
          echo "$MODULES" | jq -r '.[]' | while read module; do
            VERSIONS=$(cat changes.json | jq -r ".new_versions[\"$module\"] | .[]")
            echo "Testing module: $module"

            for version in $VERSIONS; do
              echo "  Building $module@$version..."

              # Create a temporary test workspace
              TEST_DIR=$(mktemp -d)
              echo "bazel_dep(name = \"$module\", version = \"$version\")" > "$TEST_DIR/MODULE.bazel"
              echo 'filegroup(name = "dummy", srcs = [])' > "$TEST_DIR/BUILD.bazel"

              # Use this registry
              cd "$TEST_DIR"
              bazel build //... \
                --registry=file://$GITHUB_WORKSPACE \
                --enable_bzlmod \
                --nocheck_direct_dependencies || {
                echo "Failed to build $module@$version"
                exit 1
              }

              cd "$GITHUB_WORKSPACE"
              rm -rf "$TEST_DIR"
            done
          done
        env:
          USE_BAZEL_VERSION: '7.x'
