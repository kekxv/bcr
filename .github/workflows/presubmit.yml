name: Presubmit Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'modules/**'
      - '.github/scripts/**'
      - '.github/workflows/presubmit.yml'
  workflow_dispatch:  # 允许手动触发

# 定义标签常量
env:
  TRIGGER_LABEL: 'presubmit-auto-run'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 主验证任务
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      changes_json: ${{ steps.detect.outputs.changes_json }}
      matrix: ${{ steps.platforms.outputs.matrix }}
      has_matrix: ${{ steps.platforms.outputs.has_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 确保行尾符不被转换，保持 LF 以匹配 source.json 中的校验和
          autocrlf: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests jsonschema

      - name: Detect changed modules
        id: detect
        run: |
          python .github/scripts/detect_changes.py
          python .github/scripts/detect_changes.py --output changes.json
          # Compact JSON to single line to avoid multi-line output issues
          echo "changes_json=$(jq -c . changes.json)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get test platforms from presubmit.yml
        id: platforms
        run: |
          python .github/scripts/get_test_platforms.py --changes-json changes.json --output platforms.json
          echo "matrix=$(jq -c . platforms.json)" >> $GITHUB_OUTPUT
          # Check if matrix has any items
          if [ "$(jq '.include | length' platforms.json)" -gt 0 ]; then
            echo "has_matrix=true" >> $GITHUB_OUTPUT
          else
            echo "has_matrix=false" >> $GITHUB_OUTPUT
          fi

      - name: Get PR labels
        id: labels
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' | tr '\n' ' ')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all validations
        id: validate
        run: |
          # Run presubmit and capture output
          python .github/scripts/presubmit.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --pr-labels "${{ steps.labels.outputs.labels }}" \
            2>&1 | tee presubmit-output.log
          # Check exit code
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output results to Job Summary
        if: always()
        run: |
          echo "### 🔍 Presubmit 检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output presubmit results
          if [ -f .github/presubmit-results.md ]; then
            cat .github/presubmit-results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 未找到检查结果文件，可能是脚本执行出错" >> $GITHUB_STEP_SUMMARY
          fi

          # If there were errors, show error log
          if [ -f presubmit-output.log ]; then
            # Check if there were failures or script errors
            if grep -q "FAIL" .github/presubmit-results.md 2>/dev/null || grep -qE "(Traceback|Error|error|Exception)" presubmit-output.log; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "---" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ⚠️ 错误详情" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              # Show relevant error lines
              grep -E "(✗|FAIL|Error|error|Traceback|Exception|File \")" presubmit-output.log | head -50 >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Create skipped check when no changes
        if: "steps.detect.outputs.has_changes != 'true'"
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'bazel-test-result',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'skipped',
              output: {
                title: 'No module changes',
                summary: 'No module version changes detected in this PR. Bazel tests are skipped.'
              }
            });

      - name: Create skipped check when no test platforms
        if: "steps.detect.outputs.has_changes == 'true' && steps.platforms.outputs.has_matrix != 'true'"
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'bazel-test-result',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'skipped',
              output: {
                title: 'No test platforms configured',
                summary: 'Module changes detected but no test platforms configured in presubmit.yml. Bazel tests are skipped.'
              }
            });

      - name: Create pending check for bazel-test
        if: "!contains(github.event.pull_request.labels.*.name, 'presubmit-auto-run') && steps.detect.outputs.has_changes == 'true' && steps.platforms.outputs.has_matrix == 'true'"
        uses: actions/github-script@v7
        with:
          script: |
            // Get platforms from matrix output
            const matrix = JSON.parse('${{ steps.platforms.outputs.matrix }}');
            const platforms = matrix.include.map(item => item.platform);

            // Create pending check runs for each platform
            for (const platform of platforms) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: `bazel-test (${platform})`,
                head_sha: context.payload.pull_request.head.sha,
                status: 'queued',
                output: {
                  title: 'Waiting for presubmit-auto-run label',
                  summary: 'Add the `presubmit-auto-run` label to trigger Bazel tests.'
                }
              });
            }

  # Bazel build test - 使用动态 matrix 配置
  bazel-test:
    runs-on: ${{ matrix.os }}
    needs: [validate]
    if: contains(github.event.pull_request.labels.*.name, 'presubmit-auto-run') && needs.validate.outputs.has_changes == 'true' && needs.validate.outputs.has_matrix == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 确保行尾符不被转换，保持 LF 以匹配 source.json 中的校验和
          autocrlf: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-version: '1.20.0'

      - name: Create changes.json
        run: |
          echo '${{ needs.validate.outputs.changes_json }}' > changes.json

      - name: Check if platform is needed
        id: check-platform
        run: |
          python .github/scripts/check_platform_needed.py --platform ${{ matrix.platform }} --changes-json changes.json
        env:
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}

      - name: Run Bazel tests for ${{ matrix.platform }}
        if: steps.check-platform.outputs.needed == 'true'
        run: |
          python .github/scripts/run_bazel_tests.py --platform ${{ matrix.platform }} --changes-json changes.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Bazel test result check - 用于设置为 Required status check
  bazel-test-result:
    runs-on: ubuntu-latest
    needs: [validate, bazel-test]
    if: always() && (needs.validate.outputs.has_changes == 'true' || needs.validate.result == 'success')
    permissions:
      contents: read
      pull-requests: read
      checks: write
      actions: read
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - name: Check bazel-test results
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let jobSummary = '### 🧪 Bazel 测试结果\n\n';

            // First check if validate job failed
            const validateResult = '${{ needs.validate.result }}';
            if (validateResult === 'failure') {
              jobSummary += '| 平台 | 状态 |\n';
              jobSummary += '| :--- | :--- |\n';
              jobSummary += '| 所有平台 | ❌ 验证失败 |\n';
              jobSummary += '\n';
              jobSummary += '> ❌ **验证失败**: presubmit 验证检查失败，Bazel 测试无法执行\n';
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, jobSummary);

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'failure',
                output: {
                  title: '❌ Validation failed',
                  summary: 'Presubmit validation checks failed. Bazel tests cannot be executed.'
                }
              });
              core.setOutput('result', 'validation-failed');
              core.setFailed('Validation job failed - Bazel tests skipped');
              return;
            }

            // Check if presubmit-auto-run label exists
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const hasTriggerLabel = pr.labels.some(l => l.name === 'presubmit-auto-run');

            if (!hasTriggerLabel) {
              // No trigger label - mark as waiting
              jobSummary += '| 平台 | 状态 |\n';
              jobSummary += '| :--- | :--- |\n';
              jobSummary += '| 所有平台 | ⏳ 等待标签 |\n';
              jobSummary += '\n';
              jobSummary += '> ⏳ **等待触发**: 添加 `presubmit-auto-run` 标签以触发 Bazel 测试\n';
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, jobSummary);

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'queued',
                output: {
                  title: 'Waiting for presubmit-auto-run label',
                  summary: 'Add the `presubmit-auto-run` label to trigger Bazel tests.'
                }
              });
              core.setOutput('result', 'waiting');
              return;
            }

            // Get workflow run jobs
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            // Find bazel-test matrix jobs (exclude bazel-test-result)
            const bazelTestJobs = jobs.jobs.filter(j => 
              j.name.startsWith('bazel-test') && !j.name.includes('result')
            );
            
            if (bazelTestJobs.length === 0) {
              // No bazel-test jobs found - likely skipped
              jobSummary += '| 平台 | 状态 |\n';
              jobSummary += '| :--- | :--- |\n';
              jobSummary += '| - | ⏭️ 跳过 |\n';
              jobSummary += '\n';
              jobSummary += '> ⏭️ **测试跳过**: 无变更或测试被跳过\n';
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, jobSummary);

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'skipped',
                output: {
                  title: 'Bazel tests skipped',
                  summary: 'No changes detected or tests were skipped.'
                }
              });
              core.setOutput('result', 'skipped');
              return;
            }

            // Check all matrix job results
            let allPassed = true;
            let failedPlatforms = [];

            for (const job of bazelTestJobs) {
              // Extract platform from job name: "bazel-test (platform: macos, os: macos-latest)"
              // or legacy format: "bazel-test (macos)"
              const platformMatch = job.name.match(/platform:\s*([^,\)]+)/);
              const platform = platformMatch ? platformMatch[1].trim() :
                (job.name.match(/bazel-test\s*\(([^)]+)\)/) ? job.name.match(/bazel-test\s*\(([^)]+)\)/)[1] : job.name);

              if (job.conclusion !== 'success') {
                allPassed = false;
                failedPlatforms.push(platform);
              }
            }

            // Create final check result with friendly summary
            const passedPlatforms = bazelTestJobs.filter(j => j.conclusion === 'success').map(j => {
              const match = j.name.match(/platform:\s*([^,\)]+)/);
              return match ? match[1].trim() :
                (j.name.match(/bazel-test\s*\(([^)]+)\)/) ? j.name.match(/bazel-test\s*\(([^)]+)\)/)[1] : j.name);
            });
            const failedPlatformsList = failedPlatforms.join(', ');
            const passedPlatformsList = passedPlatforms.join(', ');

            let summaryText = '';
            if (allPassed) {
              summaryText = `✅ **All tests passed on ${bazelTestJobs.length} platform(s)**\n\n**Platforms:** ${passedPlatformsList}\n\nSee individual "bazel-test (platform)" check runs for detailed results.`;
            } else {
              summaryText = `❌ **Tests failed on ${failedPlatforms.length} platform(s)**\n\n**Failed:** ${failedPlatformsList}\n**Passed:** ${passedPlatformsList || 'none'}\n\nSee individual "bazel-test (platform)" check runs for detailed error messages.`;
            }

            if (allPassed) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: '✅ All Bazel tests passed',
                  summary: summaryText
                }
              });
              core.setOutput('result', 'success');
            } else {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'failure',
                output: {
                  title: '❌ Bazel tests failed',
                  summary: summaryText
                }
              });
              core.setOutput('result', 'failure');
              core.setFailed(`Bazel tests failed on: ${failedPlatforms.join(', ')}`);
            }

            // Output test results to job summary
            jobSummary = '### 🧪 Bazel 测试结果\n\n';
            jobSummary += '| 平台 | 状态 |\n';
            jobSummary += '| :--- | :--- |\n';
            for (const job of bazelTestJobs) {
              const platformMatch = job.name.match(/platform:\s*([^,\)]+)/);
              const platform = platformMatch ? platformMatch[1].trim() :
                (job.name.match(/bazel-test\s*\(([^)]+)\)/) ? job.name.match(/bazel-test\s*\(([^)]+)\)/)[1] : job.name);
              const status = job.conclusion === 'success' ? '✅ 通过' : '❌ 失败';
              jobSummary += `| ${platform} | ${status} |\n`;
            }
            jobSummary += '\n';
            if (allPassed) {
              jobSummary += '> ✅ **所有测试通过** 🎉\n';
            } else {
              jobSummary += `> ❌ **测试失败**: ${failedPlatformsList}\n`;
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, jobSummary);
