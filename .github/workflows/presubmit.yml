name: Presubmit Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'modules/**'
      - '.github/scripts/**'
      - '.github/workflows/presubmit.yml'
  workflow_dispatch:  # 允许手动触发

# 定义标签常量
env:
  TRIGGER_LABEL: 'run-presubmit'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 主验证任务
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      changes_json: ${{ steps.detect.outputs.changes_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests jsonschema

      - name: Detect changed modules
        id: detect
        run: |
          python .github/scripts/detect_changes.py
          python .github/scripts/detect_changes.py --output changes.json
          # Compact JSON to single line to avoid multi-line output issues
          echo "changes_json=$(jq -c . changes.json)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR labels
        id: labels
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' | tr '\n' ' ')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all validations
        id: validate
        run: |
          python .github/scripts/presubmit.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --pr-labels "${{ steps.labels.outputs.labels }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output results to log
        if: always()
        run: |
          if [ -f .github/presubmit-results.md ]; then
            echo "=== Presubmit Results ==="
            cat .github/presubmit-results.md
            echo "========================="
          fi

  # Bazel build test - 独立的等待标签和矩阵配置
  bazel-test:
    runs-on: ${{ matrix.os }}
    needs: [validate]
    if: ${{ needs.validate.outputs.has_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu2404
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
          - platform: linux_arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Wait for presubmit-auto-run label
        id: wait-label
        uses: actions/github-script@v7
        with:
          script: |
            const triggerLabel = 'presubmit-auto-run';
            const maxWaitMinutes = 360; // 6 hours timeout
            const checkIntervalSeconds = 30;
            const maxAttempts = (maxWaitMinutes * 60) / checkIntervalSeconds;

            console.log(`⏳ [${{ matrix.platform }}] Waiting for '${triggerLabel}' label...`);
            console.log(`Timeout: ${maxWaitMinutes} minutes`);

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });

              const hasLabel = pr.labels.some(l => l.name === triggerLabel);

              if (hasLabel) {
                console.log(`✅ Label '${triggerLabel}' found after ${attempt * checkIntervalSeconds}s`);
                return;
              }

              if (attempt % 10 === 0) {
                console.log(`  Still waiting... (${attempt}/${maxAttempts})`);
              }

              await new Promise(resolve => setTimeout(resolve, checkIntervalSeconds * 1000));
            }

            core.setFailed(`Timeout: Label '${triggerLabel}' not added within ${maxWaitMinutes} minutes`);

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-version: '1.20.0'

      - name: Create changes.json
        run: |
          echo '${{ needs.validate.outputs.changes_json }}' > changes.json

      - name: Run Bazel tests for ${{ matrix.platform }}
        run: |
          python .github/scripts/run_bazel_tests.py --platform ${{ matrix.platform }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
