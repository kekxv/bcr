name: Presubmit Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'modules/**'
      - '.github/scripts/**'
      - '.github/workflows/presubmit.yml'
  workflow_dispatch:  # 允许手动触发

# 定义标签常量
env:
  TRIGGER_LABEL: 'presubmit-auto-run'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 主验证任务
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      changes_json: ${{ steps.detect.outputs.changes_json }}
      matrix: ${{ steps.platforms.outputs.matrix }}
      has_matrix: ${{ steps.platforms.outputs.has_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests jsonschema

      - name: Detect changed modules
        id: detect
        run: |
          python .github/scripts/detect_changes.py
          python .github/scripts/detect_changes.py --output changes.json
          # Compact JSON to single line to avoid multi-line output issues
          echo "changes_json=$(jq -c . changes.json)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get test platforms from presubmit.yml
        id: platforms
        run: |
          python .github/scripts/get_test_platforms.py --changes-json changes.json --output platforms.json
          echo "matrix=$(jq -c . platforms.json)" >> $GITHUB_OUTPUT
          # Check if matrix has any items
          if [ "$(jq '.include | length' platforms.json)" -gt 0 ]; then
            echo "has_matrix=true" >> $GITHUB_OUTPUT
          else
            echo "has_matrix=false" >> $GITHUB_OUTPUT
          fi

      - name: Get PR labels
        id: labels
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' | tr '\n' ' ')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all validations
        id: validate
        run: |
          python .github/scripts/presubmit.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --pr-labels "${{ steps.labels.outputs.labels }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output results to log
        if: always()
        run: |
          if [ -f .github/presubmit-results.md ]; then
            echo "=== Presubmit Results ==="
            cat .github/presubmit-results.md
            echo "========================="
          fi

      - name: Create pending check for bazel-test
        if: "!contains(github.event.pull_request.labels.*.name, 'presubmit-auto-run') && steps.detect.outputs.has_changes == 'true'"
        uses: actions/github-script@v7
        with:
          script: |
            // Get platforms from matrix output
            const matrix = JSON.parse('${{ steps.platforms.outputs.matrix }}');
            const platforms = matrix.include.map(item => item.platform);
            
            // Create pending check runs for each platform
            for (const platform of platforms) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: `bazel-test (${platform})`,
                head_sha: context.payload.pull_request.head.sha,
                status: 'queued',
                output: {
                  title: 'Waiting for presubmit-auto-run label',
                  summary: 'Add the `presubmit-auto-run` label to trigger Bazel tests.'
                }
              });
            }

  # Bazel build test - 使用动态 matrix 配置
  bazel-test:
    runs-on: ${{ matrix.os }}
    needs: [validate]
    if: contains(github.event.pull_request.labels.*.name, 'presubmit-auto-run') && needs.validate.outputs.has_changes == 'true' && needs.validate.outputs.has_matrix == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 确保行尾符不被转换，保持 LF 以匹配 source.json 中的校验和
          autocrlf: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-version: '1.20.0'

      - name: Create changes.json
        run: |
          echo '${{ needs.validate.outputs.changes_json }}' > changes.json

      - name: Check if platform is needed
        id: check-platform
        run: |
          python .github/scripts/check_platform_needed.py --platform ${{ matrix.platform }} --changes-json changes.json
        env:
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}

      - name: Run Bazel tests for ${{ matrix.platform }}
        if: steps.check-platform.outputs.needed == 'true'
        run: |
          python .github/scripts/run_bazel_tests.py --platform ${{ matrix.platform }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Bazel test result check - 用于设置为 Required status check
  bazel-test-result:
    runs-on: ubuntu-latest
    needs: [validate, bazel-test]
    if: always() && needs.validate.outputs.has_changes == 'true'
    permissions:
      contents: read
      pull-requests: read
      checks: write
      actions: read
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - name: Check bazel-test results
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Check if presubmit-auto-run label exists
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const hasTriggerLabel = pr.labels.some(l => l.name === 'presubmit-auto-run');

            if (!hasTriggerLabel) {
              // No trigger label - mark as waiting
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'queued',
                output: {
                  title: 'Waiting for presubmit-auto-run label',
                  summary: 'Add the `presubmit-auto-run` label to trigger Bazel tests.'
                }
              });
              core.setOutput('result', 'waiting');
              return;
            }

            // Get workflow run jobs
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            // Find bazel-test matrix jobs (exclude bazel-test-result)
            const bazelTestJobs = jobs.jobs.filter(j => 
              j.name.startsWith('bazel-test') && !j.name.includes('result')
            );
            
            if (bazelTestJobs.length === 0) {
              // No bazel-test jobs found - likely skipped
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'skipped',
                output: {
                  title: 'Bazel tests skipped',
                  summary: 'No changes detected or tests were skipped.'
                }
              });
              core.setOutput('result', 'skipped');
              return;
            }

            // Check all matrix job results
            let allPassed = true;
            let failedPlatforms = [];
            
            for (const job of bazelTestJobs) {
              // Extract platform from job name: "bazel-test (platform)" or "bazel-test"
              const platformMatch = job.name.match(/bazel-test\s*\(([^)]+)\)/);
              const platform = platformMatch ? platformMatch[1] : job.name;
              
              if (job.conclusion !== 'success') {
                allPassed = false;
                failedPlatforms.push(platform);
              }
            }

            // Create final check result
            if (allPassed) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'All Bazel tests passed',
                  summary: `All ${bazelTestJobs.length} platform tests completed successfully.`
                }
              });
              core.setOutput('result', 'success');
            } else {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'bazel-test-result',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'failure',
                output: {
                  title: 'Bazel tests failed',
                  summary: `Failed platforms: ${failedPlatforms.join(', ')}`
                }
              });
              core.setOutput('result', 'failure');
              core.setFailed(`Bazel tests failed on: ${failedPlatforms.join(', ')}`);
            }
