name: Generate Module Diff

on:
  pull_request:
    paths:
      - 'modules/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Generate diff
        id: diff
        run: |
          python .github/scripts/generate_diff.py \
            --output .github/diff-results.md

      - name: Output diff to log
        run: |
          if [ -f .github/diff-results.md ]; then
            echo "=== Module Diff Results ==="
            cat .github/diff-results.md
            echo "==========================="
          fi
