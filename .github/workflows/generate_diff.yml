name: Generate Module Diff

on:
  pull_request:
    paths:
      - 'modules/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Generate diff
        id: diff
        run: |
          python .github/scripts/generate_diff.py \
            --output .github/diff-results.md

      - name: Output diff to Job Summary
        run: |
          if [ -f .github/diff-results.md ]; then
            # Add header to job summary
            echo "### 📋 Module Version Diff" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Comparing new/modified versions with their previous versions:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Add diff content (GitHub renders markdown in job summary)
            cat .github/diff-results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ No Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No new or modified module versions found." >> $GITHUB_STEP_SUMMARY
          fi
