name: Generate Module Diff

on:
  pull_request:
    paths:
      - 'modules/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Generate diff
        id: diff
        run: |
          python .github/scripts/generate_diff.py \
            --base-ref ${{ github.event.pull_request.base.sha }} \
            --output .github/diff-results.md

      - name: Output diff to Job Summary
        run: |
          if [ -f .github/diff-results.md ]; then
            cat .github/diff-results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ No Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No new or modified module versions found." >> $GITHUB_STEP_SUMMARY
          fi
